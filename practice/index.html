<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Grid Layout</h2>

  <div class="container">
    <div class="small-box">Bottom Right</div>
  </div>

  <div class="info">
    <p>Container size: 300px × 200px</p>
    <p>Container grid squares: 30 squares wide × 20 squares high</p>
    <p>Small box size: 100px × 50px</p>
    <p>Small box grid squares: 10 squares wide × 5 squares high</p>
    <p>Small box position: 10px from bottom and 10px from right</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
